notes:
  - "Live viewer source selection is being added on top of the existing ncode trace dashboard; ncode remains the only fully supported live trace source by default."
  - "Live API now accepts harness and limit query parameters and returns source metadata plus usage summaries so unsupported harnesses can be shown honestly."
  - "Descriptor-backed harnesses can declare optional liveTrace roots and field mappings for JSONL trace scanning."
  - "Live usage now separates measured token/cost data from missing trace instrumentation and avoids presenting missing values as real zeroes."
  - "Live UI now includes a harness picker, usage strip, per-session usage status, and drawer usage/timeline details."
  - "Codex is a first-party live source backed by ~/.codex/sessions and ~/.codex/archived_sessions; both Codex Desktop and codex-tui traces are represented through the codex harness."
  - "Codex live view uses a source-aware default recent slice of 50 sessions because Codex rollout JSONL files are much larger than ncode traces; explicit API/query limits still work."
  - "Live Sessions now treats ncode JSONL traces as evidence with measured/inferred/missing/malformed metric provenance instead of presenting absent model, token, cost, or duration fields as known zeroes."
  - "Live Sessions redaction defaults on and hides local usernames in visible project paths, transcript previews, warnings, and drawer details; raw paths remain server-side for transcript lookup."
  - "Live Sessions UI now uses an operator dashboard layout with quality/source badges, summary cards, filters, sorting, a richer session drawer, and responsive stacked rows."
  - "Live Sessions infers missing ncode/Noumena Code model metadata as GLM 5.2 (1M) with inferred provenance, not measured provenance."
  - "Live Sessions client polling now catches failed /api/live fetches and aborts in-flight polls on unmount so transient dev-server or navigation states do not trigger a Next runtime overlay."
  - "Live Sessions now extracts trace intelligence from ncode JSONL: execution graph counts, tool reliability, queue/interruption flow, prompt/title metadata, modes/branches, and touched-file signals."
  - "Ncode assistant message usage is now parsed from message.usage events, so recent live sessions can show measured input/output/cache tokens and per-assistant usage segments even when no final result event exists."
  - "Harness/rubric branch is being merged into the actual AgentEvals git history on branch codex/merge-neval-harness-rubric."
  - "Harness selection, harness discovery pages, cross-harness leaderboard surfaces, adapter-backed execution, and decoupled rubric_llm judging are being integrated on top of the telemetry integrity UI layer."
  - "rubric_llm judging now routes through a separate judge harness adapter instead of reusing the harness under test."
  - "Telemetry now distinguishes measured values from missing or incomplete instrumentation instead of presenting all tok/s and tool metrics as equally authoritative."
  - "Run detail now exposes a confidence layer that separates pass rate from proof coverage, known-bad coverage, and structural weaknesses."
  - "Run detail output now prioritizes live eval readability, visual artifact previews, and responsive operator UI."
  - "Mobile layout is no longer intentionally deprioritized for run detail; sidebar collapses to a top rail on narrow viewports."
  - "GLM 5.2 should be treated as vision-input blind but strong at visual-code output such as SVG, Three.js, web UI, and app UI."
  - "Private GitHub repo created at RasputinKaiser/NEval."
  - "Telemetry strip surfaces errorRate, forbiddenViolationRate, failsSafelyRate, and cheapestPassUsd"
  - "UX pass mounted advertised routes instead of leaving sidebar links as 404s."
  - "Visual-code is now part of the active case universe, not just files on disk."
