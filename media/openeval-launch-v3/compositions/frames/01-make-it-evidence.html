      (() => {

      const frameRoot = document.querySelector('[data-composition-id="01-make-it-evidence"]');
      const overviewLayers = frameRoot.querySelectorAll(".overview-depth, .overview-frame");

      const wipeEdge = frameRoot.querySelector(".wipe-edge");
      const fieldIndex = frameRoot.querySelector(".field-index");
      const proofLabel = frameRoot.querySelector(".proof-label");
      const finalRule = frameRoot.querySelector(".final-rule");
      const rail = frameRoot.querySelector(".evidence-rail");
      const evidenceField = frameRoot.querySelector("#oe-evidence-field");
      const productPromise = frameRoot.querySelector(".product-promise");
      const tl = gsap.timeline({ paused: true });

      // Beat 1 (0–2s): the tension lands before the scan clears.
      tl.fromTo(
        overviewLayers,
        { scaleX: 0.02, opacity: 0.2, transformOrigin: "0% 0%" },
        { scaleX: 1, opacity: 1, duration: 0.24, ease: "power4.out", stagger: 0.012 },
        0.04,
      );
      tl.fromTo(
        wipeEdge,
        { x: 0, opacity: 1 },
        { x: 1699, opacity: 1, duration: 0.24, ease: "power4.out" },
        0.04,
      );
      tl.to(wipeEdge, { opacity: 0, duration: 0.12, ease: "none" }, 0.28);
      tl.fromTo(
        fieldIndex,
        { x: -26, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.42, ease: "power3.out" },
        0.34,
      );

      const LABEL_BASE = 0.08;
      const LABEL_SEC_PER_CHAR = 0.009;
      let labelCursor = 0.58;
      const LABEL_TIMING = labelWords.map((word) => {
        const duration = LABEL_BASE + word.textContent.trim().length * LABEL_SEC_PER_CHAR;
        const start = labelCursor;
        labelCursor += duration;
        return { word, start, duration };
      });
      LABEL_TIMING.forEach(({ word, start, duration }) => {
        tl.fromTo(
          word,
          { x: 28, opacity: 0 },
          { x: 0, opacity: 1, duration, ease: "power3.out" },
          start,
        );
      });

      // The two product surfaces settle as one opening composition, not a third scene.
      tl.to(
        overviewLayers,
        { x: -30, y: 30, scaleX: 0.57, scaleY: 0.95, duration: 0.58, ease: "power3.inOut", stagger: 0.02 },
        0.28,
      );
      tl.to(
        proofLabel,
        { x: -30, y: 30, opacity: 0.66, duration: 0.58, ease: "power3.inOut" },
        0.28,
      );
      tl.fromTo(
        componentLayers,
        { x: 420, scale: 0.82, opacity: 0, transformOrigin: "0% 0%" },
        { x: 0, scale: 1, opacity: 1, duration: 0.58, ease: "power3.out", stagger: 0.035 },
        0.34,
      );

      const PHRASE_BEATS = [0.06, 0.24, 0.46];
      sceneTwoPhrases.forEach((phrase, index) => {
        tl.fromTo(
          phrase,
          { x: 86 + index * 24, opacity: 0 },
          { x: 0, opacity: 1, duration: 0.34, ease: ["power4.out", "expo.out", "circ.out"][index] },
          PHRASE_BEATS[index],
        );
      });

      // Beat 2 (2–5s): a single hard reset into the launch promise.
      sceneTwoPhrases.forEach((phrase, index) => {
        const outAt = 1.72 + index * 0.018;
        tl.to(phrase, { x: -230, duration: 0.34, ease: "power4.in" }, outAt);
        tl.to(phrase, { opacity: 0, duration: 0.18, ease: "power1.in" }, outAt + 0.14);
      });
      tl.to(
        overviewLayers,
        { x: 0, y: 574, scaleX: 0.58, scaleY: 0.22, opacity: 0, duration: 0.42, ease: "power4.inOut", stagger: 0.018 },
        1.72,
      );
      tl.to(
        componentLayers,
        { x: 0, y: 360, scaleX: 0.96, scaleY: 0.34, opacity: 0, duration: 0.42, ease: "power4.inOut", stagger: 0.018 },
        1.72,
      );
      tl.to(proofLabel, { y: 604, x: -30, opacity: 0, duration: 0.38, ease: "power4.inOut" }, 1.72);

      tl.fromTo(
        evidenceField,
        { opacity: 0, scale: 1.055, x: 28 },
        { opacity: 0.42, scale: 1.015, x: 0, duration: 0.64, ease: "power3.out" },
        1.78,
      );
      tl.to(evidenceField, { x: -20, scale: 1.03, opacity: 0.50, duration: 2.64, ease: "none" }, 2.44);

      // Kinetic beat-slam: one shared beat array, three distinct attacks, then stillness.
      const FINAL_BEATS = [2.02, 2.22, 2.44];
      tl.fromTo(
        finalStatement,
        { x: 230, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.4, ease: "power4.out" },
        FINAL_BEATS[0],
      );
      tl.fromTo(
        "#el-01-make-it-evidence-now",
        { scale: 1.42, filter: "blur(10px)", opacity: 0 },
        { scale: 1, filter: "blur(0px)", opacity: 1, duration: 0.46, ease: "power4.out" },
        FINAL_BEATS[0],
      );
      tl.fromTo(
        "#el-01-make-it-evidence-make",
        { x: 260, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.43, ease: "expo.out" },
        FINAL_BEATS[1],
      );
      tl.fromTo(
        "#el-01-make-it-evidence-evidence",
        { y: 96, rotation: 4, opacity: 0 },
        { y: 0, rotation: 0, opacity: 1, duration: 0.52, ease: "circ.out" },
        FINAL_BEATS[2],
      );
      tl.fromTo(
        finalRule,
        { scaleX: 0, opacity: 0 },
        { scaleX: 1, opacity: 1, duration: 0.36, ease: "back.out(2)" },
        2.74,
      );
      tl.fromTo(
        rail,
        { y: 18, opacity: 0 },
        { y: 0, opacity: 1, duration: 0.42, ease: "power3.out" },
        2.92,
      );
      tl.fromTo(
        productPromise,
        { x: 38, opacity: 0 },
        { x: 0, opacity: 1, duration: 0.48, ease: "power3.out" },
