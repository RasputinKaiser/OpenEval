name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # Cache the installed tree itself (not just the npm download cache) so
      # unchanged lockfiles skip npm ci entirely, including the better-sqlite3
      # native build. Key pins OS + Node major because the cached tree holds a
      # compiled ABI-specific binding.
      - uses: actions/cache@v4
        id: node-modules-cache
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node20-${{ hashFiles('package-lock.json') }}
      - run: npm ci
        if: steps.node-modules-cache.outputs.cache-hit != 'true'
      # Smoke the dev-runtime doctor itself (report-only checks; exit 0 unless
      # the environment is genuinely broken).
      - run: npm run doctor
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      # Grades every case's no-op baseline and executes known-bad oracle
      # scripts locally; harness binary checks record "skip" when absent and
      # rubric_llm graders are skipped without --with-llm-judge, so no LLM or
      # agent CLI is ever invoked here.
      - run: npm run selftest
      # Sole automated enforcement of the public-identity and local-data rules.
      # The script falls back to grep -E when ripgrep is absent, so no extra
      # install step is needed.
      - run: bash scripts/public-upload-audit.sh
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
